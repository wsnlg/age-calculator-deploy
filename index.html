<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年龄计算器 - Age Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.9/lunar.js"></script>
    <style>
        /* ========== CSS Variables & Theme ========== */
        /* 默认暗色主题（无 data-theme 时） */
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-card-hover: #1a2745;
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b8;
            --text-muted: #6a6a80;
            --accent: #e94560;
            --accent-glow: rgba(233, 69, 96, 0.3);
            --accent-secondary: #0f3460;
            --border: #2a2a40;
            --success: #00d2a0;
            --warning: #ffc107;
            --info: #4fc3f7;
            --gradient-1: linear-gradient(135deg, #e94560, #c23152);
            --gradient-2: linear-gradient(135deg, #0f3460, #1a4a8a);
            --gradient-3: linear-gradient(135deg, #16213e, #1a1a2e);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 系统亮色模式自动适配 */
        @media (prefers-color-scheme: light) {
            :root:not([data-theme="dark"]):not([data-theme="light"]) {
                --bg-primary: #f0f2f5;
                --bg-secondary: #ffffff;
                --bg-card: #ffffff;
                --bg-card-hover: #f5f5f5;
                --text-primary: #1a1a2e;
                --text-secondary: #555570;
                --text-muted: #8888a0;
                --accent: #e94560;
                --accent-glow: rgba(233, 69, 96, 0.15);
                --accent-secondary: #0f3460;
                --border: #e0e0e8;
                --success: #00b386;
                --warning: #f0a500;
                --info: #2196f3;
                --gradient-1: linear-gradient(135deg, #e94560, #c23152);
                --gradient-2: linear-gradient(135deg, #4fc3f7, #2196f3);
                --gradient-3: linear-gradient(135deg, #f0f2f5, #e8eaf0);
                --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            }
        }

        /* 手动切换亮色 */
        [data-theme="light"] {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #f5f5f5;
            --text-primary: #1a1a2e;
            --text-secondary: #555570;
            --text-muted: #8888a0;
            --accent: #e94560;
            --accent-glow: rgba(233, 69, 96, 0.15);
            --accent-secondary: #0f3460;
            --border: #e0e0e8;
            --success: #00b386;
            --warning: #f0a500;
            --info: #2196f3;
            --gradient-1: linear-gradient(135deg, #e94560, #c23152);
            --gradient-2: linear-gradient(135deg, #4fc3f7, #2196f3);
            --gradient-3: linear-gradient(135deg, #f0f2f5, #e8eaf0);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        /* 手动切换暗色（覆盖系统亮色） */
        [data-theme="dark"] {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-card-hover: #1a2745;
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b8;
            --text-muted: #6a6a80;
            --accent: #e94560;
            --accent-glow: rgba(233, 69, 96, 0.3);
            --accent-secondary: #0f3460;
            --border: #2a2a40;
            --success: #00d2a0;
            --warning: #ffc107;
            --info: #4fc3f7;
            --gradient-1: linear-gradient(135deg, #e94560, #c23152);
            --gradient-2: linear-gradient(135deg, #0f3460, #1a4a8a);
            --gradient-3: linear-gradient(135deg, #16213e, #1a1a2e);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* ========== 星期几 ========== */
        .weekday-info {
            text-align: center;
            padding: 16px;
        }
        .weekday-info .weekday-main {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .weekday-info .weekday-details {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.8;
        }

        /* ========== 生命周历 ========== */
        .week-calendar-desc {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 12px;
            text-align: center;
        }
        .week-calendar {
            display: grid;
            grid-template-columns: repeat(52, 1fr);
            gap: 1px;
            max-width: 100%;
            overflow-x: auto;
        }
        .week-cell {
            aspect-ratio: 1;
            min-width: 6px;
            border-radius: 2px;
            background: var(--border);
            transition: all 0.2s;
        }
        .week-cell.lived {
            background: var(--accent);
        }
        .week-cell.current {
            background: var(--warning);
            box-shadow: 0 0 4px var(--warning);
        }
        .week-cell:hover {
            transform: scale(2);
            z-index: 1;
        }

        /* ========== 趣味年龄 ========== */
        .fun-age {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 8px 0;
        }
        .fun-age-item {
            text-align: center;
            padding: 12px;
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
        }
        .fun-age-item .fun-icon {
            font-size: 1.5rem;
            margin-bottom: 4px;
        }
        .fun-age-item .fun-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
        }
        .fun-age-item .fun-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ========== 节气季节 ========== */
        .season-info {
            text-align: center;
            padding: 16px;
        }
        .season-info .season-main {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .season-info .season-details {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.8;
        }

        /* ========== 历史上的今天 ========== */
        .history-info {
            padding: 8px 0;
        }
        .history-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            line-height: 1.6;
            color: var(--text-secondary);
        }
        .history-item:last-child {
            border-bottom: none;
        }
        .history-item .history-year {
            color: var(--accent);
            font-weight: 700;
            margin-right: 8px;
        }

        /* ========== 同日生名人 ========== */
        .famous-list {
            padding: 8px 0;
        }
        .famous-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .famous-item:last-child {
            border-bottom: none;
        }
        .famous-item .famous-emoji {
            font-size: 1.3rem;
            margin-right: 10px;
        }
        .famous-item .famous-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-right: 8px;
        }
        .famous-item .famous-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ========== 纪念日 ========== */
        .anniversary-add {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .anniversary-add input {
            flex: 1;
            min-width: 100px;
            padding: 8px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        .anniversary-add input[type="date"] {
            max-width: 160px;
        }
        .anniversary-btn {
            padding: 8px 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .anniversary-btn:hover {
            opacity: 0.9;
        }
        .anniversary-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .anniversary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
        }
        .anniversary-item .anni-info {
            flex: 1;
        }
        .anniversary-item .anni-name {
            font-weight: 600;
            color: var(--text-primary);
        }
        .anniversary-item .anni-date {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .anniversary-item .anni-countdown {
            text-align: right;
            color: var(--accent);
            font-weight: 600;
            font-size: 0.9rem;
        }
        .anniversary-item .anni-delete {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            margin-left: 8px;
            padding: 4px;
        }
        .anniversary-item .anni-delete:hover {
            color: #e94560;
        }


        /* ========== Reset & Base ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .site-footer {
            text-align: center;
            padding: 24px 16px 32px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .site-footer .footer-brand {
            font-weight: 600;
            margin-right: 8px;
        }
        .site-footer .footer-url {
            opacity: 0.7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: var(--transition);
            line-height: 1.6;
        }

        /* ========== Header ========== */
        .header {
            text-align: center;
            padding: 40px 20px 20px;
            position: relative;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .theme-toggle:hover {
            background: var(--bg-card-hover);
            transform: rotate(30deg);
        }

        /* ========== Container ========== */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        /* ========== Card ========== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow), 0 0 20px var(--accent-glow);
        }

        .card-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title .icon {
            font-size: 1.2rem;
        }

        /* ========== Calendar Type Switch ========== */
        .calendar-switch {
            display: flex;
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
            padding: 4px;
            margin-bottom: 20px;
        }

        .calendar-switch button {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .calendar-switch button.active {
            background: var(--gradient-1);
            color: #fff;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        /* ========== Date Input ========== */
        .date-input-group {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .date-field {
            flex: 1;
            min-width: 80px;
        }

        .date-field label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .date-field select,
        .date-field input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }

        .date-field select:focus,
        .date-field input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* ========== Dual Calendar Display ========== */
        .dual-calendar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
            padding: 16px;
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
        }

        .dual-calendar-item {
            text-align: center;
        }

        .dual-calendar-item .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .dual-calendar-item .value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent);
            white-space: nowrap;
        }

        .dual-calendar-item .value.solar {
            color: var(--info);
        }

        /* ========== Core Display ========== */
        .core-display {
            text-align: center;
            padding: 30px 20px;
        }

        .core-display .main-time {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .core-display .main-time .unit {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 400;
            margin: 0 2px;
        }

        .core-display .sub-time {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .core-display .sub-time .unit {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 400;
            margin: 0 2px;
        }

        .total-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .total-stat {
            text-align: center;
        }

        .total-stat .number {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--info);
        }

        .total-stat .label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* ========== Birthday Countdown ========== */
        .birthday-countdown {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .birthday-note {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.75rem;
            padding: 4px 0;
        }

        .birthday-item {
            padding: 20px;
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
            text-align: center;
            transition: var(--transition);
        }

        .birthday-item:hover {
            transform: translateY(-2px);
        }

        .birthday-item .type {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .birthday-item .days {
            font-size: 2rem;
            font-weight: 700;
            color: var(--warning);
        }

        .birthday-item .days .small {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .birthday-item .date-info {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .birthday-today {
            animation: celebrate 1s ease-in-out infinite alternate;
        }

        @keyframes celebrate {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        /* ========== 星座 & 生肖 并排布局 ========== */
        .zodiac-sx-layout {
            display: grid;
            grid-template-columns: 1fr 1px 1fr;
            gap: 0;
            align-items: start;
        }

        .zodiac-sx-divider {
            background: var(--border);
            align-self: stretch;
            margin: 4px 0;
        }

        .zodiac-sx-col {
            padding: 0 16px;
        }

        .zodiac-sx-col:first-child {
            padding-left: 0;
        }

        .zodiac-sx-col:last-child {
            padding-right: 0;
        }

        /* 共用头部 */
        .zs-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .zs-emoji {
            font-size: 2rem;
            line-height: 1;
        }

        .zs-header-text {
            min-width: 0;
        }

        .zs-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .zs-sub {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* 信息网格 */
        .zs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 12px;
            margin-bottom: 10px;
        }

        .zs-grid-item {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .zs-label {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .zs-value {
            font-size: 0.82rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        /* 配对行 */
        .zs-match-row-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 16px;
            font-size: 0.78rem;
            margin-bottom: 10px;
            padding: 6px 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .zs-match-label {
            color: var(--text-muted);
        }

        .zs-match-value {
            font-weight: 500;
        }

        .zs-match-value.good { color: var(--success); }
        .zs-match-value.bad { color: var(--danger); }

        /* 性格解读 */
        .zs-desc {
            font-size: 0.78rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* ========== Life Stats Grid ========== */
        .life-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .life-stat-item {
            padding: 16px 12px;
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
            text-align: center;
            transition: var(--transition);
        }

        .life-stat-item:hover {
            transform: translateY(-2px);
            background: var(--bg-card-hover);
        }

        .life-stat-item .stat-icon {
            font-size: 1.5rem;
            margin-bottom: 6px;
        }

        .life-stat-item .stat-value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 2px;
            word-break: break-all;
        }

        .life-stat-item .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* ========== Life Progress ========== */
        .progress-section {
            text-align: center;
        }

        .progress-ring-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
        }

        .progress-ring {
            width: 200px;
            height: 200px;
            transform: rotate(-90deg);
        }

        .progress-ring-bg {
            fill: none;
            stroke: var(--border);
            stroke-width: 12;
        }

        .progress-ring-fill {
            fill: none;
            stroke: url(#progressGradient);
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .progress-text .percentage {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .progress-text .percentage-sign {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        .progress-text .stage {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 500;
            margin-top: 4px;
        }

        .life-expectancy-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .life-expectancy-control label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .life-expectancy-control input {
            width: 80px;
            padding: 6px 10px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 1rem;
            text-align: center;
        }

        .life-expectancy-control input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .life-expectancy-control span {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .stage-bar {
            display: flex;
            border-radius: var(--radius-sm);
            overflow: hidden;
            height: 8px;
            margin-top: 16px;
        }

        .stage-bar div {
            height: 100%;
            transition: var(--transition);
        }

        .stage-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* ========== Placeholder State ========== */
        .placeholder {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .placeholder .icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .placeholder p {
            font-size: 0.95rem;
        }

        /* ========== Animations ========== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            animation: fadeInUp 0.5s ease forwards;
        }

        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.2s; }
        .card:nth-child(4) { animation-delay: 0.3s; }
        .card:nth-child(5) { animation-delay: 0.4s; }
        .card:nth-child(6) { animation-delay: 0.5s; }

        /* ========== Responsive ========== */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.7rem;
            }

            .card {
                padding: 18px;
            }

            .core-display .main-time {
                font-size: 1.5rem;
            }

            .core-display .sub-time {
                font-size: 1.1rem;
            }

            .life-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .date-input-group {
                gap: 6px;
                flex-wrap: wrap;
            }

            .date-field {
                min-width: 70px;
            }

            .date-field.time-field {
                min-width: 60px;
            }

            .dual-calendar {
                gap: 8px;
                padding: 12px;
            }

            .dual-calendar-item .value {
                font-size: 0.85rem;
            }

            .date-field select,
            .date-field input {
                padding: 8px 4px;
                font-size: 0.85rem;
            }

            .total-stats {
                gap: 16px;
            }

            .birthday-countdown {
                grid-template-columns: 1fr;
            }

            .zodiac-sx-layout {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .zodiac-sx-divider {
                display: none;
            }

            .zodiac-sx-col {
                padding: 0;
            }

            .zodiac-sx-col:first-child {
                padding-bottom: 12px;
                border-bottom: 1px solid var(--border-color);
                margin-bottom: 12px;
            }

            .progress-ring-container {
                width: 160px;
                height: 160px;
            }

            .progress-ring {
                width: 160px;
                height: 160px;
            }

            .fun-age {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .week-cell {
                min-width: 4px;
            }
            .anniversary-add {
                flex-direction: column;
            }
            .anniversary-add input[type="date"] {
                max-width: 100%;
            }
        }

        /* ========== Scrollbar ========== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* ========== Number animation ========== */
        .num-animate {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .num-animate.changed {
            animation: numPop 0.3s ease;
        }

        @keyframes numPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); color: var(--accent); }
            100% { transform: scale(1); }
        }

        /* Hidden utility */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">

        <!-- Core Display Card -->

        <!-- 星座 & 生肖卡片 -->
<div class="card hidden" id="zodiacShengxiaoCard">

</div>

        <!-- 节气季节卡片 -->

        <!-- Birthday Countdown Card -->

        <!-- Life Progress Card -->

        <!-- Life Stats Card -->

            <div class="week-calendar-desc">每格代表一周，已度过的已着色（寿命与上方生命进度一致）</div>

            <div class="card-title"><span class="icon">💝</span> 纪念日管理</div>
            <div class="anniversary-section">
                <div class="anniversary-add">
                    <input type="text" id="anniversaryName" placeholder="纪念日名称（如恋爱纪念日）" maxlength="20">
                    <input type="date" id="anniversaryDate">

    <script>
        // ========== WeChat UA Detection ==========
        var isWeChat = /MicroMessenger/i.test(navigator.userAgent);

        // ========== Polyfill: String.prototype.endsWith ==========
        if (typeof String.prototype.endsWith !== 'function') {
            String.prototype.endsWith = function(search, this_len) {
                if (this_len === undefined || this_len > this.length) {
                    this_len = this.length;
                }
                return this.substring(this_len - search.length, this_len) === search;
            };
        }

        // ========== Polyfill: Array.prototype.map ==========
        if (typeof Array.prototype.map !== 'function') {
            Array.prototype.map = function(callback, thisArg) {
                var arr = this;
                var result = [];
                for (var i = 0; i < arr.length; i++) {
                    if (i in arr) {
                        result.push(callback.call(thisArg, arr[i], i, arr));
                    }
                }
                return result;
            };
        }

        // ========== Polyfill: Array.prototype.forEach ==========
        if (typeof Array.prototype.forEach !== 'function') {
            Array.prototype.forEach = function(callback, thisArg) {
                var arr = this;
                for (var i = 0; i < arr.length; i++) {
                    if (i in arr) {
                        callback.call(thisArg, arr[i], i, arr);
                    }
                }
            };
        }

        // ========== State ==========
        var calendarType = 'solar'; // 'solar' or 'lunar'
        var birthSolarDate = null;   // Date object for solar birth
        var birthLunarYear = 0;
        var birthLunarMonth = 0;
        var birthLunarDay = 0;
        var birthLunarIsLeapMonth = false;
        var birthHour = -1;
        var birthMinute = -1;
        var updateTimer = null;
        var prevSeconds = -1;

        // ========== Initialization ==========
        function init() {
            populateYears();
            populateHours();
            populateMinutes();
            setDefaultDate();
            onDateChange();
            loadAnniversaries();
            renderAnniversaries();
        }

        function populateYears() {
            var sel = document.getElementById('yearSelect');
            var currentYear = new Date().getFullYear();
            for (var y = currentYear; y >= 1900; y--) {
                var opt = document.createElement('option');
                opt.value = y;
                opt.textContent = y + '年';
                sel.appendChild(opt);
            }
        }

        function populateHours() {
            var sel = document.getElementById('hourSelect');
            for (var h = 0; h < 24; h++) {
                var opt = document.createElement('option');
                opt.value = h;
                opt.textContent = (h < 10 ? '0' : '') + h + '时';
                sel.appendChild(opt);
            }
        }

        function populateMinutes() {
            var sel = document.getElementById('minuteSelect');
            for (var m = 0; m < 60; m++) {
                var opt = document.createElement('option');
                opt.value = m;
                opt.textContent = (m < 10 ? '0' : '') + m + '分';
                sel.appendChild(opt);
            }
        }

        function setDefaultDate() {
            // 尝试从本地缓存恢复
            var saved = null;
            try { saved = localStorage.getItem('age-calculator-date'); } catch(e) {}
            if (saved) {
                try {
                    var data = JSON.parse(saved);
                    // 恢复历法类型
                    if (data.calendarType === 'solar' || data.calendarType === 'lunar') {
                        calendarType = data.calendarType;
                        document.getElementById('btnSolar').classList.toggle('active', calendarType === 'solar');
                        document.getElementById('btnLunar').classList.toggle('active', calendarType === 'lunar');
                    }
                    // 恢复年
                    if (data.year) {
                        document.getElementById('yearSelect').value = '' + data.year;
                    } else {
                        document.getElementById('yearSelect').value = '' + (new Date().getFullYear() - 1);
                    }
                    populateMonths();
                    // 恢复月
                    if (data.month && document.querySelector('#monthSelect option[value="' + data.month + '"]')) {
                        document.getElementById('monthSelect').value = data.month;
                    }
                    populateDays();
                    // 恢复日
                    if (data.day && document.querySelector('#daySelect option[value="' + data.day + '"]')) {
                        document.getElementById('daySelect').value = data.day;
                    }
                    // 恢复时分
                    if (data.hour !== undefined && data.hour !== null) {
                        document.getElementById('hourSelect').value = '' + data.hour;
                    }
                    if (data.minute !== undefined && data.minute !== null) {
                        document.getElementById('minuteSelect').value = '' + data.minute;
                    }
                } catch(e) {
                    // 缓存数据异常，使用默认值
                    document.getElementById('yearSelect').value = '' + (new Date().getFullYear() - 1);
                    populateMonths();
                    document.getElementById('monthSelect').value = '1';
                    populateDays();
                    document.getElementById('daySelect').value = '1';
                }
            } else {
                document.getElementById('yearSelect').value = '' + (new Date().getFullYear() - 1);
                populateMonths();
                document.getElementById('monthSelect').value = '1';
                populateDays();
                document.getElementById('daySelect').value = '1';
            }
        }

        function saveDateToCache() {
            try {
                var data = {
                    calendarType: calendarType,
                    year: document.getElementById('yearSelect').value,
                    month: document.getElementById('monthSelect').value,
                    day: document.getElementById('daySelect').value,
                    hour: document.getElementById('hourSelect').value,
                    minute: document.getElementById('minuteSelect').value
                };
                localStorage.setItem('age-calculator-date', JSON.stringify(data));
            } catch(e) {}
        }

        // ========== Calendar Switch ==========
        function switchCalendar(type) {
            calendarType = type;
            document.getElementById('btnSolar').classList.toggle('active', type === 'solar');
            document.getElementById('btnLunar').classList.toggle('active', type === 'lunar');
            var prevMonth = document.getElementById('monthSelect').value;
            var prevDay = document.getElementById('daySelect').value;
            populateMonths();
            // Try to keep previous month
            if (document.querySelector('#monthSelect option[value="' + prevMonth + '"]')) {
                document.getElementById('monthSelect').value = prevMonth;
            }
            populateDays();
            // Try to keep previous day
            if (document.querySelector('#daySelect option[value="' + prevDay + '"]')) {
                document.getElementById('daySelect').value = prevDay;
            }
            onDateChange();
        }

        // ========== Populate Months ==========
        function populateMonths() {
            var sel = document.getElementById('monthSelect');
            sel.innerHTML = '';
            if (calendarType === 'solar') {
                for (var m = 1; m <= 12; m++) {
                    var opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = m + '月';
                    sel.appendChild(opt);
                }
            } else {
                var year = parseInt(document.getElementById('yearSelect').value);
                // Get lunar months for this year (including leap months)
                var months = getLunarMonths(year);
                for (var i = 0; i < months.length; i++) {
                    var mItem = months[i];
                    var opt = document.createElement('option');
                    opt.value = mItem.value;
                    opt.textContent = mItem.label;
                    sel.appendChild(opt);
                }
            }
        }

        function getLunarMonths(year) {
            var months = [];
            // Use lunar-javascript to get leap month info
            try {
                var solar = Solar.fromYmd(year, 1, 1);
                var lunar = solar.getLunar();
                var leapMonth = lunar.getYearLeapMonth();
                for (var m = 1; m <= 12; m++) {
                    months.push({ value: m + '', label: m + '月', isLeap: false });
                    if (leapMonth === m) {
                        months.push({ value: m + '_leap', label: '闰' + m + '月', isLeap: true });
                    }
                }
            } catch (e) {
                for (var m = 1; m <= 12; m++) {
                    months.push({ value: m + '', label: m + '月', isLeap: false });
                }
            }
            return months;
        }

        // ========== Populate Days ==========
        function populateDays() {
            var sel = document.getElementById('daySelect');
            sel.innerHTML = '';
            var year = parseInt(document.getElementById('yearSelect').value);
            var monthVal = document.getElementById('monthSelect').value;
            var maxDay = 30;

            if (calendarType === 'solar') {
                maxDay = new Date(year, parseInt(monthVal), 0).getDate();
            } else {
                maxDay = getLunarMaxDay(year, monthVal);
            }

            for (var d = 1; d <= maxDay; d++) {
                var opt = document.createElement('option');
                opt.value = d;
                opt.textContent = d + '日';
                sel.appendChild(opt);
            }
        }

        function getLunarMaxDay(year, monthVal) {
            // Default to 30, try to get exact from lunar-javascript
            try {
                var isLeap = monthVal.endsWith('_leap');
                var month = parseInt(monthVal);
                // Try to find a valid day by checking from 30 down
                for (var d = 30; d >= 1; d--) {
                    try {
                        var lunar = Lunar.fromYmd(year, month, d, isLeap);
                        lunar.getSolar(); // validate
                        return d;
                    } catch (e) {
                        continue;
                    }
                }
            } catch (e) {}
            return 30;
        }

        function onMonthChange() {
            populateDays();
            document.getElementById('daySelect').value = '1';
            onDateChange();
        }

        // ========== Date Change Handler ==========
        function onDateChange() {
            var year = parseInt(document.getElementById('yearSelect').value);
            var monthVal = document.getElementById('monthSelect').value;
            var day = parseInt(document.getElementById('daySelect').value);
            birthHour = parseInt(document.getElementById('hourSelect').value);
            birthMinute = parseInt(document.getElementById('minuteSelect').value);

            try {
                if (calendarType === 'solar') {
                    var month = parseInt(monthVal);
                    birthSolarDate = new Date(year, month - 1, day,
                        birthHour >= 0 ? birthHour : 0,
                        birthMinute >= 0 ? birthMinute : 0,
                        birthMinute >= 0 ? 0 : 0);

                    // Convert to lunar
                    var solar = Solar.fromYmd(year, month, day);
                    var lunar = solar.getLunar();
                    birthLunarYear = lunar.getYear();
                    birthLunarMonth = lunar.getMonth();
                    birthLunarDay = lunar.getDay();
                    birthLunarIsLeapMonth = false;

                    updateDualCalendar(
                        year + '年' + month + '月' + day + '日',
                        lunar.getYearInChinese() + '年' + lunar.getMonthInChinese() + '月' + lunar.getDayInChinese()
                    );
                } else {
                    var isLeap = monthVal.endsWith('_leap');
                    var month = parseInt(monthVal);
                    birthLunarYear = year;
                    birthLunarMonth = month;
                    birthLunarDay = day;
                    birthLunarIsLeapMonth = isLeap;

                    var lunar = Lunar.fromYmd(year, month, day, isLeap);
                    var solar = lunar.getSolar();

                    birthSolarDate = new Date(solar.getYear(), solar.getMonth() - 1, solar.getDay(),
                        birthHour >= 0 ? birthHour : 0,
                        birthMinute >= 0 ? birthMinute : 0,
                        birthMinute >= 0 ? 0 : 0);

                    updateDualCalendar(
                        solar.getYear() + '年' + solar.getMonth() + '月' + solar.getDay() + '日',
                        lunar.getYearInChinese() + '年' + lunar.getMonthInChinese() + '月' + lunar.getDayInChinese()
                    );
                }

                // Show result cards
                showResults();
                startUpdating();
            } catch (e) {
                console.error('Date conversion error:', e);
            }
            saveDateToCache();
        }

        function updateDualCalendar(solarStr, lunarStr) {
            document.getElementById('solarDisplay').textContent = solarStr;
            document.getElementById('lunarDisplay').textContent = lunarStr;
        }

        // ========== Show/Hide Results ==========
        function showResults() {
            var ids = ['coreCard', 'weekdayCard', 'zodiacShengxiaoCard', 'seasonCard', 'birthdayCard', 'progressCard', 'lifeStatsCard', 'weekCalendarCard', 'funAgeCard', 'historyCard', 'famousCard', 'anniversaryCard'];
            for (var i = 0; i < ids.length; i++) {
                document.getElementById(ids[i]).classList.remove('hidden');
            }
        }

        // ========== Real-time Update ==========
        var lastUpdateDate = '';

        function startUpdating() {
            if (updateTimer) clearInterval(updateTimer);
            updateAll();
            updateStaticCards();
            updateTimer = setInterval(updateAll, 1000);
        }

        function formatNumber(num) {
            if (num >= 100000000) {
                return (num / 100000000).toFixed(2) + ' 亿';

            }

        // ========== Life Progress ==========
        function updateProgress() {
            if (!birthSolarDate) return;
            var now = new Date();
            var expectancy = parseInt(document.getElementById('lifeExpectancy').value) || 75;

            var ageMs = now.getTime() - birthSolarDate.getTime();
            var totalMs = expectancy * 365.25 * 24 * 3600 * 1000;
            var percent = Math.min(100, Math.max(0, (ageMs / totalMs) * 100));

            // Update circle
            var circle = document.getElementById('progressCircle');
            var circumference = 2 * Math.PI * 85; // r=85
            var offset = circumference - (percent / 100) * circumference;
            circle.style.strokeDashoffset = offset;

            // Update text
            document.getElementById('progressPercent').textContent = percent.toFixed(2);

            // Update stage
            var age = ageMs / (365.25 * 24 * 3600 * 1000);
            var stage = '';
            if (age < 6) stage = '👶 幼年';
            else if (age < 17) stage = '📚 少年';
            else if (age < 35) stage = '🌟 青年';
            else if (age < 55) stage = '💼 中年';
            else stage = '🍵 老年';
            document.getElementById('lifeStage').textContent = stage;
        }

                    historyCache[key] = data;
                    renderHistory(el, data, month, day);

                            try {
                                var json = JSON.parse(xhr.responseText);
                                var events = json.events || json.selected || [];

                                for (var i = 0; i < Math.min(events.length, 8); i++) {
                                    var ev = events[i];

        function updateFamous() {
            if (!birthSolarDate) return;
            var month = birthSolarDate.getMonth() + 1;
            var day = birthSolarDate.getDate();
            var key = month + '-' + day;
            var el = document.getElementById('famousList');

            // 如果已有缓存，直接渲染

                renderFamous(el, famousCache[key], month, day);
                return;
            }

            // 显示加载状态
            el.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px;">加载中...</div>';

            // 先尝试 Wikipedia 中文 API
            fetchWikipediaBirths(month, day, function(data) {
                if (data && data.length > 0) {
                    famousCache[key] = data;
                    renderFamous(el, data, month, day);
                } else {
                    // 备用：zenquotes API
                    fetchZenquotesBirths(month, day, function(data2) {
                        if (data2 && data2.length > 0) {
                            famousCache[key] = data2;
                            renderFamous(el, data2, month, day);
                        } else {
                            // 兜底：静态数据
                            var staticData = getStaticFamous(key);
                            famousCache[key] = staticData;
                            renderFamous(el, staticData, month, day);
                        }
                    });
                }
            });
        }

        function fetchWikipediaBirths(month, day, callback) {
            try {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', 'https://zh.wikipedia.org/api/rest_v1/feed/onthisday/births/' + month + '/' + day, true);
                xhr.timeout = 5000;
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            try {
                                var json = JSON.parse(xhr.responseText);
                                var births = json.births || json.selected || [];
                                var result = [];
                                for (var i = 0; i < Math.min(births.length, 10); i++) {
                                    var b = births[i];
                                    var text = b.text || '';
                                    // 去除 HTML 标签
                                    text = text.replace(/<[^>]*>/g, '');
                                    // 提取年份和名字
                                    var yearMatch = text.match(/^(-?\d+)\s*[–\-—]\s*(.*)/);
                                    if (yearMatch) {
                                        result.push({ n: yearMatch[2], d: yearMatch[1] + '年出生', e: '🌟' });
                                    } else {
                                        result.push({ n: text, d: '', e: '🌟' });
                                    }
                                }
                                callback(result);
                            } catch(e) { callback(null); }
                        } else {
                            callback(null);
                        }
                    }
                };
                xhr.ontimeout = function() { callback(null); };
                xhr.onerror = function() { callback(null); };
                xhr.send();
            } catch(e) { callback(null); }
        }

        function fetchZenquotesBirths(month, day, callback) {
            try {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', 'https://today.zenquotes.io/api/' + month + '/' + day, true);
                xhr.timeout = 5000;
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            try {
                                var json = JSON.parse(xhr.responseText);
                                var births = (json.data && json.data.Births) || [];
                                var result = [];
                                for (var i = 0; i < Math.min(births.length, 10); i++) {
                                    var text = births[i].text || '';
                                    text = text.replace(/<[^>]*>/g, '');
                                    var yearMatch = text.match(/^(-?\d+)\s*[–\-—]\s*(.*)/);
                                    if (yearMatch) {
                                        result.push({ n: yearMatch[2], d: yearMatch[1] + '年出生', e: '🌟' });
                                    } else {
                                        result.push({ n: text, d: '', e: '🌟' });
                                    }
                                }
                                callback(result);
                            } catch(e) { callback(null); }
                        } else {
                            callback(null);
                        }
                    }
                };
                xhr.ontimeout = function() { callback(null); };
                xhr.onerror = function() { callback(null); };
                xhr.send();
            } catch(e) { callback(null); }
        }

        // ========== 纪念日管理 ==========
        var anniversaries = [];

        function loadAnniversaries() {
            try {
                var saved = localStorage.getItem('age-calculator-anniversaries');
                if (saved) anniversaries = JSON.parse(saved);
            } catch(e) {
                anniversaries = [];
            }
        }

        function saveAnniversaries() {
            try {
                localStorage.setItem('age-calculator-anniversaries', JSON.stringify(anniversaries));
            } catch(e) {}
        }

        function addAnniversary() {
            var nameEl = document.getElementById('anniversaryName');
            var dateEl = document.getElementById('anniversaryDate');
            var name = nameEl.value.trim();
            var date = dateEl.value;
            if (!name) { alert('请输入纪念日名称'); return; }
            if (!date) { alert('请选择纪念日日期'); return; }
            anniversaries.push({ name: name, date: date, id: Date.now() });
            saveAnniversaries();
            nameEl.value = '';
            dateEl.value = '';
            renderAnniversaries();
        }

        function deleteAnniversary(id) {
            var newArr = [];
            for (var i = 0; i < anniversaries.length; i++) {
                if (anniversaries[i].id !== id) newArr.push(anniversaries[i]);
            }
            anniversaries = newArr;
            saveAnniversaries();
            renderAnniversaries();
        }

        function renderAnniversaries() {
            var el = document.getElementById('anniversaryList');
            if (anniversaries.length === 0) {
                el.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:16px;">还没有添加纪念日</div>';
                return;
            }
            var now = new Date();
            var html = '';
            for (var i = 0; i < anniversaries.length; i++) {
                var item = anniversaries[i];
                var parts = item.date.split('-');
                var m = parseInt(parts[1]);
                var d = parseInt(parts[2]);
                // 计算下一次纪念日
                var nextDate = new Date(now.getFullYear(), m - 1, d);
                if (nextDate.getTime() <= now.getTime()) {
                    nextDate = new Date(now.getFullYear() + 1, m - 1, d);
                }
                var diffDays = Math.ceil((nextDate.getTime() - now.getTime()) / (24 * 3600 * 1000));
                // 计算已经过了多少年
                var firstDate = new Date(parseInt(parts[0]), m - 1, d);
                var years = now.getFullYear() - firstDate.getFullYear();
                if (now.getMonth() < m - 1 || (now.getMonth() === m - 1 && now.getDate() < d)) {
                    years--;
                }
                html += '<div class="anniversary-item">' +
                    '<div class="anni-info">' +
                    '<div class="anni-name">' + item.name + '</div>' +
                    '<div class="anni-date">' + item.date + '（已' + Math.max(0, years) + '年）</div>' +
                    '</div>' +
                    '<div class="anni-countdown">' + (diffDays === 0 ? '🎉 今天！' : '还有' + diffDays + '天') + '</div>' +
                    '<button class="anni-delete" onclick="deleteAnniversary(' + item.id + ')" title="删除">✕</button>' +
                    '</div>';
            }
            el.innerHTML = html;
        }

        // ========== Theme Toggle ==========
        var userTheme = null; // null=跟随系统, 'light'=亮色, 'dark'=暗色

        function getSystemTheme() {
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
                return 'light';
            }
            return 'dark';
        }

        function applyTheme(theme) {
            var body = document.body;
            var btn = document.querySelector('.theme-toggle');
            if (theme === 'light') {
                body.setAttribute('data-theme', 'light');
                btn.textContent = '☀️';
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.textContent = '🌙';
            }
        }

        function toggleTheme() {
            // 循环切换: 跟随系统 → 亮色 → 暗色 → 跟随系统
            if (userTheme === null) {
                userTheme = 'light';
                applyTheme('light');
            } else if (userTheme === 'light') {
                userTheme = 'dark';
                applyTheme('dark');
            } else {
                userTheme = null;
                applyTheme(getSystemTheme());
            }
            try { localStorage.setItem('age-calculator-theme', userTheme); } catch(e) {}
        }

        // 初始化主题
        (function() {
            // 读取用户偏好
            var saved = null;
            try { saved = localStorage.getItem('age-calculator-theme'); } catch(e) {}
            if (saved === 'light' || saved === 'dark') {
                userTheme = saved;
            } else {
                userTheme = null;
            }
            applyTheme(userTheme || getSystemTheme());

            // 监听系统主题变化
            if (window.matchMedia) {
                var mq = window.matchMedia('(prefers-color-scheme: light)');
                if (mq.addListener) {
                    mq.addListener(function(e) {
                        if (userTheme === null) {
                            applyTheme(e.matches ? 'light' : 'dark');
                        }
                    });
                } else if (mq.addEventListener) {
                    mq.addEventListener('change', function(e) {
                        if (userTheme === null) {
                            applyTheme(e.matches ? 'light' : 'dark');
                        }
                    });
                }
            }
        })();

        // ========== Page Visibility API ==========
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                if (updateTimer) {
                    clearInterval(updateTimer);
                    updateTimer = null;
                }
            } else {
                if (birthSolarDate) {
                    startUpdating();
                }
            }
        });

        // ========== Start ==========
        init();
    </script>
